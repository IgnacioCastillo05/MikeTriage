version: '3.8'

services:
  mike-triage:
    build: .
    ports:
      - "8000:8000"
    environment:
      - TRIAGE_MODELS_PATH=/app/models/triaje
      - SYNTHEA_OUTPUT_PATH=/app/data/synthetic
      - MONGODB_URI=mongodb://mongodb:27017/
      - MONGODB_DATABASE=mike_triage
    volumes:
      - ./models:/app/models
      - ./data:/app/data
    depends_on:
      - mongodb
    restart: unless-stopped

  mongodb:
    image: mongo:6.0
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    restart: unless-stopped

volumes:
  mongodb_data: